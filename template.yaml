AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: >
  Pardon My English

  A Telegram bot designed to rephrase texts into proper English.

# More info about Globals: https://github.com/awslabs/serverless-application-model/blob/master/docs/globals.rst
Globals:
  Function:
    Timeout: 3
    MemorySize: 128

Resources:
  HandleUpdateFunction:
    Type: AWS::Serverless::Function # More info about Function Resource: https://github.com/awslabs/serverless-application-model/blob/master/versions/2016-10-31.md#awsserverlessfunction
    Properties:
      CodeUri: bot/
      Handler: telegram_bot.update_handler
      Runtime: python3.8
      Architectures:
        - x86_64
      Events:
        HandleUpdate:
          Type: Api # More info about API Event Source: https://github.com/awslabs/serverless-application-model/blob/master/versions/2016-10-31.md#api
          Properties:
            Path: /update
            Method: get

Outputs:
  # ServerlessRestApi is an implicit API created out of Events key under Serverless::Function
  # Find out more about other implicit resources you can reference within SAM
  # https://github.com/awslabs/serverless-application-model/blob/master/docs/internals/generated_resources.rst#api
  TelegramUpdateApi:
    Description: "API Gateway endpoint URL for prod stage for Telegram Update Handler function"
    Value: !Sub "https://${ServerlessRestApi}.execute-api.${AWS::Region}.amazonaws.com/prod/update/"
  HandleUpdateFunction:
    Description: "Telegram Update Handler Lambda Function ARN"
    Value: !GetAtt HandleUpdateFunction.Arn
  HandleUpdateFunctionIamRole:
    Description: "Implicit IAM Role created for Telegram Update Handler function"
    Value: !GetAtt HandleUpdateFunctionRole.Arn
